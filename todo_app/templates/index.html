<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待辦事項</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 { text-align: center; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <h1>待辦事項</h1>
    <div class="input-group">
        <input type="text" id="todoInput" placeholder="輸入文字...">
        <button onclick="addTodo()">儲存</button>
    </div>
    <ul id="todoList"></ul>

    <script>
        async function loadTodos() {
            const res = await fetch('/api/todos');
            const todos = await res.json();
            const list = document.getElementById('todoList');
            list.innerHTML = todos.map(t => `<li>${t}</li>`).join('');
        }

        async function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return alert('請輸入文字');

            const res = await fetch('/api/todos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text})
            });
            const data = await res.json();
            if (data.error) {
                alert(data.error);
            } else {
                input.value = '';
                loadTodos();
            }
        }

        loadTodos();
    </script>
</body>
</html>
